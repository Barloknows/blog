<footer class="site-footer">
  <div class="site-footer__inner">
    <span class="site-footer__copy">{{ .Site.Title | lower }} · {{ now.Year }}</span>
    <ul class="site-footer__links">
      {{ with .Site.Params.github }}<li><a href="{{ . }}" target="_blank" rel="noopener">github</a></li>{{ end }}
      <li><a href="/index.xml">rss</a></li>
    </ul>
  </div>
</footer>
